// ── Color palette by role type ──────────────────────────────────────────────
const roleColors = {
  "老生": "#e8a245",   // amber gold
  "净":   "#4a7fc1",   // steel blue
  "小生": "#5cb85c",   // green
  "旦":   "#e06c8a",   // rose pink
  "武生": "#d97c3a",   // orange
  "丑":   "#b8b04a",   // olive yellow
  "末":   "#7a8a9a",   // slate
  "红生": "#c94040",   // crimson
  "老旦": "#c87dbf",   // purple-pink
  "丑旦": "#8cc2c2",   // teal
  "正旦": "#e08cb0",   // light pink
  "武小生": "#6ab0a0", // sea green
};
const defaultColor = "#888";

function nodeColor(d) { return roleColors[d.role_type] || defaultColor; }

// ── Build legend ──────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
const presentRoles = [...new Set(graphData.nodes.map(n => n.role_type))].filter(r => roleColors[r]);
presentRoles.sort((a, b) => {
  const order = ["老生","净","小生","旦","武生","丑","末","红生","老旦","丑旦","正旦","武小生"];
  return order.indexOf(a) - order.indexOf(b);
});
presentRoles.forEach(role => {
  const div = document.createElement('div');
  div.className = 'legend-item';
  div.innerHTML = `<div class="legend-dot" style="background:${roleColors[role]}"></div><span>${role}</span>`;
  legendEl.appendChild(div);
});

// ── SVG setup ──────────────────────────────────────────────────────────────
const svg = d3.select('#canvas');
const W = window.innerWidth, H = window.innerHeight;
svg.attr('width', W).attr('height', H);

const g = svg.append('g');
svg.call(d3.zoom().scaleExtent([0.3, 5]).on('zoom', e => g.attr('transform', e.transform)));

// ── Scale helpers ──────────────────────────────────────────────────────────
const maxWeight = d3.max(graphData.links, l => l.weight);
const maxDrama = d3.max(graphData.nodes, n => n.drama_count);
const rScale = d3.scaleSqrt().domain([0, maxDrama]).range([6, 32]);
const wScale = d3.scaleLinear().domain([0, maxWeight]).range([0.8, 7]);
const opacityScale = d3.scaleLinear().domain([0, maxWeight]).range([0.2, 0.85]);

// ── Simulation ─────────────────────────────────────────────────────────────
const simulation = d3.forceSimulation(graphData.nodes)
  .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(d => {
    const base = 80;
    return base + 200 / (d.weight + 1);
  }).strength(0.6))
  .force('charge', d3.forceManyBody().strength(-350))
  .force('center', d3.forceCenter(W / 2, H / 2))
  .force('collision', d3.forceCollide(d => rScale(d.drama_count) + 6));

// ── Draw links ─────────────────────────────────────────────────────────────
const link = g.append('g')
  .selectAll('line')
  .data(graphData.links)
  .join('line')
  .attr('class', 'link')
  .attr('stroke', '#5a7a9a')
  .attr('stroke-width', d => wScale(d.weight))
  .attr('stroke-opacity', d => opacityScale(d.weight));

// ── Draw nodes ─────────────────────────────────────────────────────────────
const node = g.append('g')
  .selectAll('g')
  .data(graphData.nodes)
  .join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

node.append('circle')
  .attr('r', d => rScale(d.drama_count))
  .attr('fill', d => nodeColor(d))
  .attr('fill-opacity', 0.88)
  .attr('stroke', d => d3.color(nodeColor(d)).brighter(0.8))
  .on('mouseover', (e, d) => {
    const tip = document.getElementById('tooltip');
    const connectedLinks = graphData.links.filter(l => l.source.id === d.id || l.target.id === d.id);
    tip.style.display = 'block';
    tip.innerHTML = `<div class="name">${d.id}</div>
      <div class="detail">行当：${d.role_type}</div>
      <div class="detail">出演剧目：${d.drama_count} 部</div>
      <div class="detail">关联人物：${connectedLinks.length} 位</div>`;
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
    // Highlight neighbors
    const neighbors = new Set();
    connectedLinks.forEach(l => { neighbors.add(l.source.id); neighbors.add(l.target.id); });
    node.selectAll('circle').attr('fill-opacity', n => neighbors.has(n.id) || n.id === d.id ? 1 : 0.15);
    link.attr('stroke-opacity', l => (l.source.id === d.id || l.target.id === d.id) ? 0.9 : 0.05);
  })
  .on('mousemove', e => {
    const tip = document.getElementById('tooltip');
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  })
  .on('mouseout', () => {
    document.getElementById('tooltip').style.display = 'none';
    node.selectAll('circle').attr('fill-opacity', 0.88);
    link.attr('stroke-opacity', d => opacityScale(d.weight));
  });

node.append('text')
  .attr('dy', d => rScale(d.drama_count) + 12)
  .attr('text-anchor', 'middle')
  .text(d => d.id)
  .attr('font-size', d => d.drama_count > 30 ? 13 : 10);

// ── Tick ───────────────────────────────────────────────────────────────────
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});
</script>
